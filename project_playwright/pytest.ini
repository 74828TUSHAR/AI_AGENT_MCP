[pytest]
asyncio_mode = auto

# Test markers
markers =
    asyncio: asyncio test
    test_data(index=0): select a record index from the module test data file
    ui: UI browser test suite
    api: API test suite
    regression: regression test suite
    smoke: smoke test suite
    critical: critical functionality test

# Logging configuration
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(name)s - %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

# File logging - Configured per test file via conftest.py pytest_runtest_setup hook
# Each test file gets its own log file (e.g., login_authentication_test.log)
# log_file = logs/test_execution.log
# log_file_level = DEBUG
# log_file_format = %(asctime)s [%(levelname)8s] %(name)s - %(funcName)s:%(lineno)d - %(message)s
# log_file_date_format = %Y-%m-%d %H:%M:%S

# Test execution options
addopts = 
    --tb=short
    --strict-markers
    --maxfail=5
    --alluredir=allure-results
    --junitxml=test-results.xml
    -v

