dev:
  description: "Development Environment"
  base_url: "http://localhost:3000"
  api_base_url: "http://localhost:3000"
  window:
    mode: "maximized" # options: maximized/fullscreen, minimized, custom
    width: 1280
    height: 720
  username: "devuser@example.com"
  password: "dev@123"
  # Array/Server Configuration for DEV
  arrays:
    default:
      name: "DEV-ARRAY-01"
      ip: "192.168.1.10"
      port: 8080
      protocol: "http"
